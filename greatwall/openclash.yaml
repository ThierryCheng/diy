OpenClash
一个运行在 OpenWrt 上的 Mihomo(Clash) 客户端，兼容 Shadowsocks(R)、Vmess、Trojan、Snell 等协议，根据灵活的规则配置实现策略代理

覆写模块现已支持远程订阅，更加方便插件的远程管理及统一配置、一键订阅，欢迎各位分享配置。
